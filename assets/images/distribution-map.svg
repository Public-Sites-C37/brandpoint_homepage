    <!-- Internal state-like detail lines for realism -->
    <g stroke="#2A3A5C" stroke-width="0.5" stroke-opacity="0.4" fill="none">
      <!-- Vertical divisions -->
      <line x1="150" y1="46" x2="148" y2="230"/>
      <line x1="220" y1="36" x2="218" y2="228"/>
      <line x1="290" y1="44" x2="288" y2="300"/>
      <line x1="360" y1="66" x2="358" y2="302"/>
      <line x1="430" y1="88" x2="432" y2="258"/>
      <line x1="500" y1="51" x2="498" y2="272"/>
      <!-- Horizontal divisions -->
      <line x1="48" y1="130" x2="560" y2="130"/>
      <line x1="48" y1="180" x2="540" y2="190"/>
      <line x1="100" y1="220" x2="500" y2="262"/>
    </g>
  </g>

  <!-- Network connection lines (teal, curved) -->
  <g fill="none" stroke-linecap="round">
    <!-- LA to Chicago -->
    <path d="M 115,215 Q 250,140 360,128" stroke="#2A8F7D" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Chicago to NYC -->
    <path d="M 360,128 Q 430,100 500,105" stroke="#2A8F7D" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    <!-- NYC to Boston -->
    <path d="M 500,105 Q 510,85 518,82" stroke="#2A8F7D" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Chicago to Miami -->
    <path d="M 360,128 Q 410,210 442,298" stroke="#2A8F7D" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    <!-- NYC to Miami -->
    <path d="M 500,105 Q 490,200 442,298" stroke="#2A8F7D" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    <!-- LA to Miami -->
    <path d="M 115,215 Q 280,310 442,298" stroke="#2A8F7D" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4,3"/>
    <!-- LA to NYC -->
    <path d="M 115,215 Q 300,90 500,105" stroke="#2A8F7D" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4,3"/>
    <!-- Boston to Miami -->
    <path d="M 518,82 Q 530,190 442,298" stroke="#2A8F7D" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4,3"/>
    <!-- LA to Boston -->
    <path d="M 115,215 Q 310,30 518,82" stroke="#2A8F7D" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="4,3"/>
    <!-- Chicago to Boston -->
    <path d="M 360,128 Q 440,80 518,82" stroke="#2A8F7D" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/>
  </g>

  <!-- City markers and labels -->

  <!-- Los Angeles -->
  <g>
    <circle cx="115" cy="215" r="8" fill="#E8632B" fill-opacity="0.15" stroke="none"/>
    <circle cx="115" cy="215" r="5" fill="url(#dotCenter)" filter="url(#dotGlow)"/>
    <circle cx="115" cy="215" r="2" fill="#fff" fill-opacity="0.6"/>
    <text x="96" y="236" font-size="9" font-weight="500" fill="#ffffff" fill-opacity="0.95" text-anchor="middle">Los Angeles</text>
    <text x="96" y="246" font-size="7.5" font-weight="400" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">Times</text>
  </g>

  <!-- Chicago -->
  <g>
    <circle cx="360" cy="128" r="8" fill="#E8632B" fill-opacity="0.15" stroke="none"/>
    <circle cx="360" cy="128" r="5" fill="url(#dotCenter)" filter="url(#dotGlow)"/>
    <circle cx="360" cy="128" r="2" fill="#fff" fill-opacity="0.6"/>
    <text x="360" y="118" font-size="9" font-weight="500" fill="#ffffff" fill-opacity="0.95" text-anchor="middle">Chicago</text>
    <text x="360" y="108" font-size="7.5" font-weight="400" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">Tribune</text>
  </g>

  <!-- New York -->
  <g>
    <circle cx="500" cy="105" r="8" fill="#E8632B" fill-opacity="0.15" stroke="none"/>
    <circle cx="500" cy="105" r="5" fill="url(#dotCenter)" filter="url(#dotGlow)"/>
    <circle cx="500" cy="105" r="2" fill="#fff" fill-opacity="0.6"/>
    <text x="492" y="125" font-size="9" font-weight="500" fill="#ffffff" fill-opacity="0.95" text-anchor="end">NY Daily</text>
    <text x="492" y="135" font-size="7.5" font-weight="400" fill="#ffffff" fill-opacity="0.6" text-anchor="end">News</text>
  </g>

  <!-- Boston -->
  <g>
    <circle cx="518" cy="82" r="8" fill="#E8632B" fill-opacity="0.15" stroke="none"/>
    <circle cx="518" cy="82" r="5" fill="url(#dotCenter)" filter="url(#dotGlow)"/>
    <circle cx="518" cy="82" r="2" fill="#fff" fill-opacity="0.6"/>
    <text x="536" y="78" font-size="9" font-weight="500" fill="#ffffff" fill-opacity="0.95" text-anchor="start">Boston</text>
    <text x="536" y="88" font-size="7.5" font-weight="400" fill="#ffffff" fill-opacity="0.6" text-anchor="start">Herald</text>
  </g>

  <!-- Miami -->
  <g>
    <circle cx="442" cy="298" r="8" fill="#E8632B" fill-opacity="0.15" stroke="none"/>
    <circle cx="442" cy="298" r="5" fill="url(#dotCenter)" filter="url(#dotGlow)"/>
