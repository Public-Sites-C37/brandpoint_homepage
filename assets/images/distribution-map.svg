      L 538,186 540,188 542,190 544,192
      L 546,196 548,200 549,204 550,208
      L 550,212 549,216 548,220 546,224
      L 545,228 544,232 543,236 542,240
      L 540,244 538,248 536,250 534,252
      L 530,256 526,258 522,260 518,262
      L 514,264 510,266 506,268 502,270 498,272
      L 494,273 490,274 486,274 482,273
      L 478,272 474,270 470,268 466,266
      L 462,264 458,262 454,261 450,260
      L 446,259 442,258 438,258 434,258
      L 430,259 426,260 422,262 418,264
      L 414,266 410,268 406,272 402,276
      L 398,280 395,284 392,288 390,292
      L 388,296 386,298 382,300 378,302
      L 374,303 370,304 366,304 362,303
      L 358,302 354,300 350,298 346,296
      L 342,294 338,292 334,290 330,288
      L 326,287 322,286 318,286 314,286
      L 310,287 306,288 302,290 298,292
      L 294,295 290,298 286,300 282,302
