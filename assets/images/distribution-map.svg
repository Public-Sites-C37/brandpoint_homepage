    " fill="#1B2541" fill-opacity="0.88" stroke="#2A3A5C" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Florida peninsula -->
    <path d="
      M 434,258 L 438,262 442,268 446,274 450,280
      L 454,286 458,292 460,296 462,300 464,304
      L 466,308 467,312 468,316 468,320
      L 467,323 465,326 462,328 459,329 456,328
      L 453,326 451,323 449,320 448,316
      L 446,312 444,308 442,304 440,300
      L 438,296 436,292 434,288 432,284
      L 430,280 428,276 426,272 424,268
      L 422,264 420,262
    " fill="#1B2541" fill-opacity="0.88" stroke="#2A3A5C" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Michigan upper -->
    <path d="
      M 370,72 L 374,68 378,65 382,63 386,62
      L 390,62 394,63 396,66 398,70 398,74
      L 396,78 394,80 390,82 386,82 382,80
      L 378,78 374,76 370,74 370,72 Z
